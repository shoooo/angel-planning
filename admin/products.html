<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>製品管理 | 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="admin-sidebar">
    <a href="dashboard.html" class="sidebar-brand">
      <span class="sidebar-brand__main">管理画面</span>
      <span class="sidebar-brand__sub">エンジェルプランニング</span>
    </a>
    <nav class="sidebar-nav">
      <span class="sidebar-nav__label">メニュー</span>
      <a href="dashboard.html" class="sidebar-nav__link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" /></svg>
        ダッシュボード
      </a>
      <a href="products.html" class="sidebar-nav__link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" /></svg>
        製品管理
      </a>
      <a href="inquiries.html" class="sidebar-nav__link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" /></svg>
        お問い合わせ
        <span class="sidebar-badge" id="inquiryBadge"></span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="sidebar-back-link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
        サイトに戻る
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="admin-main">

    <header class="admin-topbar">
      <span class="topbar-title">製品管理</span>
      <div class="topbar-user">
        <span class="topbar-user__name">管理者</span>
        <button class="topbar-logout" id="logoutBtn">ログアウト</button>
      </div>
    </header>

    <div class="admin-content">

      <div class="page-header fade-in">
        <h1 class="page-header__title">製品一覧 <span id="productCount"></span></h1>
        <a href="product-edit.html" class="btn btn--primary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          製品を追加
        </a>
      </div>

      <!-- フィルター -->
      <div class="filter-bar fade-in" id="filterBar">
        <button class="filter-btn is-active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="brake">ブレーキ系</button>
        <button class="filter-btn" data-filter="engine">エンジン系</button>
        <button class="filter-btn" data-filter="suspension">足廻り</button>
        <button class="filter-btn" data-filter="electrical">電装部品</button>
      </div>

      <!-- テーブル -->
      <div class="card fade-in">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>型番</th>
                <th>製品名</th>
                <th>カテゴリ</th>
                <th>メーカー</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /admin-content -->
  </div><!-- /admin-main -->

</div><!-- /admin-layout -->

<!-- 確認ダイアログ -->
<div class="modal" id="confirmModal">
  <div class="modal__box">
    <h2 class="modal__title">削除の確認</h2>
    <p class="modal__desc" id="confirmMessage"></p>
    <div class="modal__actions">
      <button class="btn btn--ghost" id="confirmCancel">キャンセル</button>
      <button class="btn btn--danger" id="confirmOk">削除する</button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="js/admin-auth.js"></script>
<script src="js/admin-data.js"></script>
<script src="js/admin-ui.js"></script>
<script>
  AdminAuth.guard();
  AdminData.init();
  AdminUI.init();

  var CAT_LABELS = { brake: 'ブレーキ系', engine: 'エンジン系', suspension: '足廻り', electrical: '電装部品' };
  var CAT_CLASSES = { brake: 'cat-badge--brake', engine: 'cat-badge--engine', suspension: 'cat-badge--suspension', electrical: 'cat-badge--electrical' };
  var currentFilter = 'all';

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderTable() {
    var products = AdminData.getProducts();
    var filtered = currentFilter === 'all'
      ? products
      : products.filter(function (p) { return p.category === currentFilter; });

    document.getElementById('productCount').textContent = '（' + filtered.length + '件）';

    var tbody = document.getElementById('productTableBody');
    tbody.innerHTML = '';

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">該当する製品がありません</div></td></tr>';
      return;
    }

    filtered.forEach(function (product) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="td-code">' + escHtml(product.code) + '</td>' +
        '<td>' + escHtml(product.name) + '</td>' +
        '<td><span class="cat-badge ' + (CAT_CLASSES[product.category] || '') + '">' + (CAT_LABELS[product.category] || product.category) + '</span></td>' +
        '<td>' + escHtml(product.maker) + '</td>' +
        '<td>' +
          '<div class="td-actions">' +
            '<a href="product-edit.html?id=' + encodeURIComponent(product.code) + '" class="btn btn--ghost btn--sm">編集</a>' +
            '<button class="btn btn--danger btn--sm js-delete" data-code="' + escHtml(product.code) + '" data-name="' + escHtml(product.name) + '">削除</button>' +
          '</div>' +
        '</td>';
      tbody.appendChild(tr);
    });

    // 削除ボタンにイベント付与
    tbody.querySelectorAll('.js-delete').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var code = btn.dataset.code;
        var name = btn.dataset.name;
        AdminUI.showConfirm('「' + name + '」を削除しますか？\nこの操作は取り消せません。', function () {
          AdminData.deleteProduct(code);
          AdminUI.showToast('製品を削除しました', 'success');
          AdminUI.updateInquiryBadge();
          renderTable();
        });
      });
    });
  }

  // フィルター
  document.getElementById('filterBar').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('is-active'); });
    btn.classList.add('is-active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });

  renderTable();
</script>
</body>
</html>
